<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a5af9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (edge to edge) so OS-applied masks (circle/squircle/rounded-square)
       never reveal a transparent gap outside the icon's own shape. -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <!-- Chat bubble body — already sits within the inner ~80% safe zone -->
  <rect x="112" y="152" width="288" height="200" rx="44" ry="44" fill="white"/>
  <!-- Tail -->
  <polygon points="152,352 112,432 224,368" fill="white"/>
  <!-- Three dots -->
  <circle cx="192" cy="252" r="22" fill="#8b5cf6"/>
  <circle cx="256" cy="252" r="22" fill="#8b5cf6"/>
  <circle cx="320" cy="252" r="22" fill="#8b5cf6"/>
</svg>
